version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mathwave-app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Required for hot-reloading in some Docker setups (like Windows/macOS)
      - VITE_HOST=0.0.0.0 # Bind to all interfaces so it's accessible outside the container
